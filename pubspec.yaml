name: tether_app
description: Tether - Bookworm Communication Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: NovaRound
      fonts:
        - asset: assets/fonts/NovaRound-Regular.ttf
  
  assets:
    - assets/logo/
